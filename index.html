<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Greems Charging — find a station</title>
<meta name="description" content="Greems EV charging network. Choose your region to find charging stations and download the Greems app.">
<meta property="og:title" content="Greems Charging — find a station">
<meta property="og:description" content="Greems EV charging network. Choose your region.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://lp.greems.io/">
<meta property="og:image" content="https://lp.greems.io/icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
  :root{--green:#1D9E75;--green-dark:#0d5c43;--ink:#0f172a;--muted:#475569;--line:#e2e8f0;--bg:#f8fafc}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);
    background:var(--bg);display:flex;flex-direction:column;min-height:100%}
  a{color:var(--green-dark)}
  :focus-visible{outline:3px solid var(--green-dark);outline-offset:2px;border-radius:8px}
  main{flex:1;max-width:760px;margin:0 auto;padding:48px 20px;text-align:center}
  img.logo{height:120px;width:auto;margin-bottom:8px}
  h1{font-size:1.6rem;margin:.4rem 0 .2rem}
  p.sub{color:var(--muted);margin:.2rem 0 2rem}
  ul{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
  li a{display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;text-decoration:none;
    border:1px solid var(--line);border-radius:16px;padding:26px 18px;background:#fff;color:var(--ink);
    font-weight:700;min-height:120px;box-shadow:0 4px 14px rgba(15,23,42,.05);transition:transform .12s,border-color .12s}
  li a:hover{transform:translateY(-2px);border-color:var(--green)}
  li a .flag{font-size:2rem;line-height:1}
  li a .reg{font-size:1.1rem}
  li a .small{font-weight:500;color:var(--muted);font-size:.85rem}
  li a[aria-disabled="true"]{opacity:.55;pointer-events:none;cursor:default}
  .soon{display:inline-block;margin-top:4px;font-size:.72rem;font-weight:600;color:#fff;background:var(--muted);border-radius:999px;padding:2px 8px}
  footer{padding:24px 20px;color:var(--muted);font-size:.9rem;text-align:center}
</style>
</head>
<body>
<main>
  <img class="logo" src="logo.svg" alt="Greems Charging">
  <h1>Find Greems EV charging near you</h1>
  <p class="sub">Choose your region.</p>
  <ul>
    <li><a href="ca/" aria-label="Canada — Greater Toronto Area charging">
      <span class="flag" aria-hidden="true">🇨🇦</span><span class="reg">Canada</span><span class="small">Greater Toronto Area</span></a></li>
    <li><a href="pl/" aria-disabled="true" tabindex="-1" aria-label="Poland — coming soon">
      <span class="flag" aria-hidden="true">🇵🇱</span><span class="reg">Polska</span><span class="soon">Coming soon</span></a></li>
    <li><a href="be/" aria-disabled="true" tabindex="-1" aria-label="Belgium — coming soon">
      <span class="flag" aria-hidden="true">🇧🇪</span><span class="reg">Belgium</span><span class="soon">Coming soon</span></a></li>
  </ul>
</main>
<footer>© Greems · <a href="https://greems.io">greems.io</a></footer>
</body>
</html>
