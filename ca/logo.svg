<svg width="700" height="280" viewBox="0 0 700 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Greems GTA — animated logo</title>
<desc>Animated Greems GTA logo: the signal charging mark pops in with pulsing rings, then GREEMS, GTA, and the tagline slide in one after another.</desc>
<style>
@keyframes gg-pop {
  0%   { opacity: 0; transform: scale(0.4); }
  70%  { opacity: 1; transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes gg-pulse {
  0%   { r: 42px; opacity: 0.55; }
  70%  { opacity: 0; }
  100% { r: 94px; opacity: 0; }
}
@keyframes gg-arc {
  0%, 100% { opacity: 0.35; }
  50%      { opacity: 1; }
}
@keyframes gg-slide {
  from { opacity: 0; transform: translateX(-26px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes gg-bolt {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.55; }
}
.gg-mark { transform-origin: 150px 140px; opacity: 0; animation: gg-pop 0.7s cubic-bezier(.34,1.56,.64,1) forwards; }
.gg-ring { fill: none; stroke: #1D9E75; stroke-width: 3; opacity: 0; }
.gg-ring1 { animation: gg-pulse 2.6s ease-out infinite 0.8s; }
.gg-ring2 { animation: gg-pulse 2.6s ease-out infinite 2.1s; }
.gg-bolt  { animation: gg-bolt 2.6s ease-in-out infinite 0.9s; }
.gg-arc { opacity: 0; }
.gg-arc1 { animation: gg-arc 2.6s ease-in-out infinite 0.8s; }
.gg-arc2 { animation: gg-arc 2.6s ease-in-out infinite 1.2s; }
.gg-g1 { opacity: 0; animation: gg-slide 0.55s cubic-bezier(.22,1,.36,1) forwards 0.9s; }
.gg-g2 { opacity: 0; animation: gg-slide 0.55s cubic-bezier(.22,1,.36,1) forwards 1.4s; }
.gg-g3 { opacity: 0; animation: gg-slide 0.55s cubic-bezier(.22,1,.36,1) forwards 1.95s; }
@media (prefers-reduced-motion: reduce) {
  .gg-mark,.gg-g1,.gg-g2,.gg-g3 { animation: none; opacity: 1; transform: none; }
  .gg-ring1,.gg-ring2,.gg-arc1,.gg-arc2,.gg-bolt { animation: none; opacity: 0.4; }
  .gg-bolt { opacity: 1; }
}
</style>
<circle class="gg-ring gg-ring1" cx="150" cy="140" r="42"/>
<circle class="gg-ring gg-ring2" cx="150" cy="140" r="42"/>
<g class="gg-mark">
<circle cx="150" cy="140" r="58" fill="none" stroke="#9FE1CB" stroke-width="6"/>
<circle cx="150" cy="140" r="42" fill="#1D9E75"/>
<path class="gg-bolt" d="M158 114 L134 146 H150 L142 168 L168 134 H151 Z" fill="#FFFFFF"/>
</g>
<path class="gg-arc gg-arc1" d="M210 106 a42 42 0 0 1 0 68" fill="none" stroke="#1D9E75" stroke-width="4" stroke-linecap="round"/>
<path class="gg-arc gg-arc2" d="M225 90 a60 60 0 0 1 0 100" fill="none" stroke="#9FE1CB" stroke-width="4" stroke-linecap="round"/>
<text class="gg-g1" x="280" y="130" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#64748B" letter-spacing="4" font-weight="500">GREEMS</text>
<text class="gg-g2" x="280" y="170" font-family="Helvetica, Arial, sans-serif" font-size="38" fill="#085041" font-weight="700">G<tspan fill="#1D9E75">TA</tspan></text>
<text class="gg-g3" x="282" y="196" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#64748B" font-weight="400">EV charging across Greater Toronto</text>
</svg>
